<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>LuckyDrop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --cbg: #1e293b;
            --acc: #3b82f6;
            --ylw: #eab308;
            --gry: #94a3b8
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: sans-serif;
            margin: 0;
            padding: 15px;
            padding-bottom: 90px;
        }

        .hidden {
            display: none !important
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 1.2rem
        }

        .balance {
            background: var(--cbg);
            padding: 8px 15px;
            border-radius: 10px;
            color: var(--ylw)
        }

        .btn {
            background: var(--acc);
            color: #fff;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-top: 5px;
            text-transform: uppercase
        }

        .btn:active {
            transform: scale(0.95)
        }

        .btn-ylw {
            background: var(--ylw);
            color: #000
        }

        .btn-grn {
            background: #10b981;
            color: #fff
        }

        .btn-out {
            background: transparent;
            border: 1px solid var(--gry);
            color: #fff
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px
        }

        .card {
            background: var(--cbg);
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            justify-content: space-between
        }

        .card img {
            width: 100%;
            height: 80px;
            object-fit: contain;
            margin-bottom: 8px
        }

        .rl-box {
            background: #0b1120;
            border: 2px solid var(--acc);
            border-radius: 10px;
            padding: 20px 0;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden
        }

        .rl-line {
            display: flex;
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.2, 1)
        }

        .rl-item {
            min-width: 100px;
            height: 100px;
            background: var(--cbg);
            margin: 0 5px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            border-bottom: 4px solid gray
        }

        .rl-item img {
            width: 80%;
            height: 50px;
            object-fit: contain
        }

        .pointer {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 100%;
            background: red;
            z-index: 10;
            box-shadow: 0 0 10px red
        }

        .c-box {
            background: var(--cbg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #334155
        }

        .c-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 8px;
            border-bottom: 1px solid #334155;
            font-size: 13px
        }

        .c-item img {
            width: 50px;
            height: 35px;
            object-fit: contain;
            margin-right: 12px
        }

        .res-box {
            text-align: center;
            background: radial-gradient(circle, #1e293b 0%, #0f172a 70%);
            padding: 40px 15px;
            border-radius: 15px;
            border: 2px solid var(--acc)
        }

        .res-box img {
            width: 220px;
            height: 160px;
            object-fit: contain;
            margin: 20px 0
        }

        .upg-arena {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111;
            padding: 20px 10px;
            border-radius: 12px;
            border: 1px solid #333;
            margin-bottom: 15px
        }

        .upg-slot {
            width: 30%;
            height: 100px;
            background: #222;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px dashed #555;
            text-align: center;
            font-size: 11px
        }

        .upg-slot img {
            width: 90%;
            height: 50px;
            object-fit: contain
        }

        .upg-center {
            width: 35%;
            display: flex;
            flex-direction: column;
            align-items: center
        }

        .cc-box {
            position: relative;
            width: 90px;
            height: 90px;
            margin-bottom: 15px
        }

        .cc {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(var(--ylw) 0%, #333 0%);
            position: absolute;
            top: 0;
            left: 0
        }

        .cc-in {
            width: 70px;
            height: 70px;
            background: #111;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
            color: var(--ylw);
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 5
        }

        .ptr-box {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            transition: transform 3s cubic-bezier(0.1, 0.8, 0.2, 1)
        }

        .u-ptr {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 18px solid #fff
        }

        .u-lists {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px
        }

        .u-box {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 10px;
            height: 250px;
            overflow-y: auto;
            border: 1px solid #333
        }

        .u-item {
            background: #2a2a2a;
            padding: 8px;
            border-radius: 6px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            cursor: pointer;
            border-left: 4px solid gray
        }

        .common {
            border-color: #b0c3d9;
            color: #b0c3d9
        }

        .rare {
            border-color: #4b69ff;
            color: #4b69ff
        }

        .epic {
            border-color: #8847ff;
            color: #8847ff
        }

        .legendary {
            border-color: #d32ce6;
            color: #d32ce6
        }

        .gold {
            border-color: #ffd700;
            color: #ffd700
        }

        .inp {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0b1120;
            color: #fff;
            margin-bottom: 10px;
            box-sizing: border-box
        }

        .nav {
            display: flex;
            justify-content: space-around;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg);
            padding: 12px 0;
            border-top: 1px solid var(--cbg);
            z-index: 100
        }

        .nav button {
            background: none;
            border: none;
            color: var(--gry);
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.2s
        }

        .nav button.act {
            color: var(--acc);
            transform: translateY(-3px)
        }

        .nav button span {
            font-size: 20px;
            margin-bottom: 4px
        }

        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center
        }
    </style>
</head>

<body>

            uTrg: [{ name: 'AWP | Гунгнир', rarity: 'gold', price: 150000, img: iUrl + '-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot621FBRw7P7NYjV9-N24q42Ok_7hPvXQhW4A7cQh2e3Do9qmiQWyqBdpYmnxctDDIVA3aVnTrFLskrvu0ZLuupzP1zI97dM8t00' }, { name: 'AWP | Дракон', rarity: 'gold', price: 250000, img: iUrl + '-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot621FAR17P7NdTRH-t26q4SZlvD7IITdn2xZ_Ishi-TOyoD8j1yg-RE_Y2-gdYTHdlRvMFiE-APqxOu805Hu6pzByCAx7CMg-z-DyG2q8QvP' }]
        };
        let bal = 5000, inv = [], tUrl = '', cCase = '', cPrice = 0, spn = 0, uid = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : 'gst';
        let uiI = null, uiIx = -1, utI = null, uCh = 0, upg = 0;

        function ld() {
            tg.CloudStorage ? tg.CloudStorage.getKeys((e, k) => {
                if (!e && k.includes('bal')) {
                    tg.CloudStorage.getItem('bal', (e, v) => { if (v) bal = parseInt(v); tg.CloudStorage.getItem('inv', (e, v) => { if (v) inv = JSON.parse(v); tg.CloudStorage.getItem('tUrl', (e, v) => { if (v) tUrl = v; dn() }) }) })
                } else dn()
            }) : (bal = parseInt(localStorage.getItem('b')) || 5000, inv = JSON.parse(localStorage.getItem('i')) || [], tUrl = localStorage.getItem('t') || '', dn());
        }
        function dn() { document.getElementById('loader').style.display = 'none'; document.getElementById('tUrl').value = tUrl; upd() }
        function sv() {
            document.getElementById('stars').innerText = bal;
            tg.CloudStorage ? (tg.CloudStorage.setItem('bal', bal.toString()), tg.CloudStorage.setItem('inv', JSON.stringify(inv)), tg.CloudStorage.setItem('tUrl', tUrl)) : (localStorage.setItem('b', bal), localStorage.setItem('i', JSON.stringify(inv)), localStorage.setItem('t', tUrl));
            rInv(); rUpg();
        }
        function upd() { document.getElementById('stars').innerText = bal; rInv(); rUpg(); }
        function showSec(id) {
            document.querySelectorAll('.sec').forEach(e => e.classList.add('hidden')); document.getElementById('previewArea').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden'); document.querySelectorAll('.nav button').forEach(e => e.classList.remove('act'));
            document.getElementById('n-' + id).classList.add('act');
        }
        function openPrev(c, p, t) {
            cCase = c; cPrice = p; document.querySelectorAll('.sec').forEach(e => e.classList.add('hidden'));
            document.getElementById('pTitle').innerText = t; document.getElementById('spinBtn').innerText = `КРУТИТЬ ЗА ★ ${p}`;
            let l = document.getElementById('pList'); l.innerHTML = ''; let is = db[c], tw = is.reduce((s, i) => s + i.w, 0);
            is.sort((a, b) => a.w - b.w).forEach(i => {
                l.innerHTML += `<div class="c-item ${i.rarity}"><div><img src="${i.img}"><span>${i.name}<br><b style="color:var(--ylw)">★${i.price}</b></span></div><b>${(i.w / tw * 100).toFixed(1)}%</b></div>`
            });
            document.getElementById('rlArea').classList.add('hidden'); document.getElementById('resArea').classList.add('hidden');
            document.getElementById('spinBtn').classList.remove('hidden'); document.getElementById('backBtn').classList.remove('hidden');
            document.getElementById('previewArea').classList.remove('hidden');
        }
        function startRoulette() {
            if (spn) return; if (bal < cPrice) { tg.showAlert('❌ Недостаточно звезд!'); return }
            bal -= cPrice; sv(); spn = 1;
            document.getElementById('spinBtn').classList.add('hidden'); document.getElementById('backBtn').classList.add('hidden');
            document.getElementById('resArea').classList.add('hidden');
            let ra = document.getElementById('rlArea'), rl = document.getElementById('rlLine'); ra.classList.remove('hidden');
            rl.style.transition = 'none'; rl.style.transform = 'translateX(0)'; rl.innerHTML = '';
            let vi = [], tw = db[cCase].reduce((s, i) => s + i.w, 0);
            for (let i = 0; i < 50; i++) { let r = Math.random() * tw; for (let it of db[cCase]) { if (r < it.w) { vi.push(it); break } r -= it.w } }
            let wi = vi[40];
            vi.forEach(i => { rl.innerHTML += `<div class="rl-item ${i.rarity}"><img src="${i.img}"><div style="font-size:10px">${i.name.split('|')[0]}</div></div>` });
            setTimeout(() => { rl.style.transition = 'transform 4s cubic-bezier(0.1,0.8,0.2,1)'; rl.style.transform = `translateX(-${40 * 110 - window.innerWidth / 2 + 55}px)` }, 50);
            setTimeout(() => {
                inv.push(wi); sv(); tg.HapticFeedback.notificationOccurred('success');
                ra.classList.add('hidden'); let re = document.getElementById('resArea'); re.classList.remove('hidden');
                document.getElementById('wName').innerText = wi.name; document.getElementById('wName').className = wi.rarity;
                document.getElementById('wImg').src = wi.img; document.getElementById('wPrice').innerText = wi.price;
                spn = 0;
            }, 4050);
        }
        function rInv() {
            let g = document.getElementById('iGrid'); g.innerHTML = ''; if (!inv.length) return g.innerHTML = '<p style="grid-column:span 2;text-align:center">Пусто</p>';
            [...inv].sort((a, b) => b.price - a.price).forEach(i => {
                let ix = inv.findIndex(x => x === i);
                g.innerHTML += `<div class="card ${i.rarity}"><img src="${i.img}"><div style="font-size:11px;height:28px;overflow:hidden">${i.name}</div><b style="color:var(--ylw)">★${i.price}</b><div style="display:flex;gap:5px;margin-top:5px"><button class="btn btn-grn" style="padding:6px;font-size:10px;margin:0" onclick="sl(${ix})">Продать</button><button class="btn" style="padding:6px;font-size:10px;margin:0" onclick="wd(${ix})">Вывести</button></div></div>`
            });
        }
        function sl(x) { bal += inv[x].price; inv.splice(x, 1); sv(); tg.HapticFeedback.notificationOccurred('success') }
        function saveUrl() { tUrl = document.getElementById('tUrl').value; sv(); tg.showAlert('Сохранено!') }
        function wd(x) {
            if (!tUrl || !tUrl.includes('steam')) return tg.showAlert('Укажите Trade URL в Профиле!');
            tg.sendData(JSON.stringify({ action: 'withdraw', item: inv[x].name, url: tUrl })); inv.splice(x, 1); sv();
        }
        function buy(a, p) { tg.sendData(JSON.stringify({ action: 'buy', amount: a, price: p })) }
        function doTask() {
            tg.openTelegramLink('https://t.me/speedytge');
            setTimeout(() => { bal += 500; sv(); tg.showAlert('500 ★ начислены!'); let b = document.getElementById('subBtn'); b.disabled = true; b.innerText = 'Выполнено' }, 4000);
        }
        function selU(t, i, x) {
            document.getElementById('uRes').innerText = '';
            if (t === 'l') { uiI = i; uiIx = x; document.getElementById('uL').innerHTML = `<img src="${i.img}"><br>${i.name.split('|')[0]}`; document.getElementById('uL').className = `upg-slot ${i.rarity}` }
            else { utI = i; document.getElementById('uR').innerHTML = `<img src="${i.img}"><br>${i.name.split('|')[0]}`; document.getElementById('uR').className = `upg-slot ${i.rarity}` }
            calcU();
        }
        function clrU(s) {
            if (s === 'l') { uiI = null; uiIx = -1; document.getElementById('uL').innerHTML = 'Отдаем'; document.getElementById('uL').className = 'upg-slot' }
            else { utI = null; document.getElementById('uR').innerHTML = 'Получаем'; document.getElementById('uR').className = 'upg-slot' }
            calcU();
        }
        function calcU() {
            let p = document.getElementById('uPtr'); p.style.transition = 'none'; p.style.transform = 'rotate(0)';
            if (!uiI || !utI) { uCh = 0; document.getElementById('uTxt').innerText = '0%'; document.getElementById('uCc').style.background = 'conic-gradient(var(--ylw) 0%,#333 0%)'; return }
            uCh = Math.min((uiI.price / utI.price) * 100, 100);
            document.getElementById('uTxt').innerText = uCh.toFixed(1) + '%'; document.getElementById('uCc').style.background = `conic-gradient(var(--ylw) ${uCh}%,#333 0%)`;
        }
        function doUpg() {
            if (upg) return; if (!uiI || !utI) return tg.showAlert('Выбери скины!');
            upg = 1; document.getElementById('uRes').innerText = 'КРУТИМ...'; document.getElementById('uRes').style.color = '#fff';
            inv.splice(uiIx, 1); sv();
            let r = Math.random() * 100, win = r <= uCh, deg = uCh * 3.6, td = win ? (Math.random() * (deg - 2) + 1) : (deg + Math.random() * (360 - deg - 2) + 1);
            let p = document.getElementById('uPtr'); p.style.transition = 'transform 3.5s cubic-bezier(0.1,0.8,0.2,1)'; p.style.transform = `rotate(${360 * 5 + td}deg)`;
            setTimeout(() => {
                if (win) { inv.push(utI); document.getElementById('uRes').style.color = '#10b981'; document.getElementById('uRes').innerText = 'УСПЕШНО!'; tg.HapticFeedback.notificationOccurred('success') }
                else { document.getElementById('uRes').style.color = '#ef4444'; document.getElementById('uRes').innerText = 'СГОРЕЛ...'; tg.HapticFeedback.notificationOccurred('error') }
                sv(); clrU('l'); upg = 0;
            }, 3550);
        }
        function rUpg() {
            let l = document.getElementById('uInv'); l.innerHTML = '';
            inv.forEach((i, x) => { l.innerHTML += `<div class="u-item ${i.rarity}" onclick="if(!upg)selU('l',inv[${x}],${x})"><img src="${i.img}" style="width:30px;height:20px;object-fit:contain"><span style="flex-grow:1;margin-left:5px;overflow:hidden">${i.name.split('|')[0]}</span><b style="color:var(--ylw)">★${i.price}</b></div>` });
            let t = document.getElementById('uTrg'); t.innerHTML = '';
            let all = [...db.normal, ...db.premium, ...db.knife, ...db.uTrg].sort((a, b) => a.price - b.price).filter((v, i, a) => a.findIndex(x => x.name === v.name) === i);
            all.forEach((i, x) => { t.innerHTML += `<div class="u-item ${i.rarity}" onclick="if(!upg)selU('r',db.normal.concat(db.premium,db.knife,db.uTrg).find(y=>y.name==='${i.name}'),0)"><img src="${i.img}" style="width:30px;height:20px;object-fit:contain"><span style="flex-grow:1;margin-left:5px;overflow:hidden">${i.name.split('|')[0]}</span><b style="color:var(--ylw)">★${i.price}</b></div>` });
        }
        ld();
    </script>
