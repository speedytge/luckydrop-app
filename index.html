<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuckyDrop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            padding-bottom: 70px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .balance {
            background: #1e293b;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: bold;
            color: #fbbf24;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
        }

        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-top: 10px;
        }

        .btn:active {
            background: #2563eb;
        }

        .btn:disabled {
            background: #475569;
            color: #94a3b8;
        }

        .hidden {
            display: none !important;
        }

        .nav {
            display: flex;
            justify-content: space-around;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0f172a;
            padding: 15px 0;
            border-top: 1px solid #1e293b;
            z-index: 100;
        }

        .nav button {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        .nav button.active {
            color: #3b82f6;
        }

        /* Стили рулетки */
        .roulette-container {
            background: #0b1120;
            border: 2px solid #3b82f6;
            border-radius: 10px;
            padding: 20px 0;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .roulette-line {
            display: flex;
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.2, 1);
            will-change: transform;
        }

        .roulette-item {
            min-width: 100px;
            height: 100px;
            background: #1e293b;
            margin: 0 5px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            font-size: 12px;
            border-bottom: 3px solid gray;
        }

        .roulette-item.common {
            border-color: #94a3b8;
        }

        .roulette-item.rare {
            border-color: #3b82f6;
        }

        .roulette-item.epic {
            border-color: #a855f7;
        }

        .pointer {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 100%;
            background: red;
            z-index: 10;
            box-shadow: 0 0 10px red;
        }

        /* Инвентарь */
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .inv-item {
            background: #1e293b;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 12px;
            border-bottom: 3px solid gray;
        }
    </style>
</head>

<body>
    <div class="header">
        <div style="font-size: 1.2rem; font-weight: bold;">🍀 LuckyDrop</div>
        <div class="balance">★ <span id="stars">0</span></div>
    </div>

    <div id="rouletteArea" class="hidden roulette-container">
        <div class="pointer"></div>
        <div class="roulette-line" id="rouletteLine"></div>
        <div style="text-align: center; margin-top: 15px;">
            <button class="btn" id="closeRouletteBtn" style="width: auto;" onclick="closeRoulette()"
                disabled>Забрать</button>
        </div>
    </div>

    <div id="cases" class="section">
        <div class="card">
            <h3>Кейс Эко (Только дешевые скины)</h3>
            <p style="font-size: 12px; color: #94a3b8;">Содержимое: P250 Песчаная дюна, Nova Орех, AK-47 Африканская
                сетка</p>
            <p>Цена: ★ 500</p>
            <button class="btn" onclick="startRoulette('eco', 500)">Открыть кейс</button>
        </div>
        <div class="card">
            <h3>Кейс Обычный</h3>
            <p style="font-size: 12px; color: #94a3b8;">Есть шанс на редкий дроп!</p>
            <p>Цена: ★ 1500</p>
            <button class="btn" onclick="startRoulette('normal', 1500)">Открыть кейс</button>
        </div>
    </div>

    <div id="inventory" class="section hidden">
        <h3 style="text-align: center;">Твои скины</h3>
        <div class="inventory-grid" id="invGrid"></div>
    </div>

    <div id="upgrades" class="section hidden">
        <div class="card">
            <h3>Апгрейд</h3>
            <p>Рискни дешевым скином, чтобы получить дорогой!</p>
            <button class="btn" onclick="doUpgrade()">Попробовать апгрейд (Шанс 30%)</button>
            <p id="upgradeResult" style="margin-top: 10px; font-weight: bold;"></p>
        </div>
    </div>

    <div class="nav">
        <button onclick="showSection('cases', this)" class="active">Кейсы</button>
        <button onclick="showSection('inventory', this)">Инвентарь</button>
        <button onclick="showSection('upgrades', this)">Апгрейд</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Получаем ID пользователя для уникальных сохранений
        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : 'guest';

        // База данных скинов и вероятностей (чем выше weight, тем чаще падает)
        const items = {
            eco: [
                { name: 'P250 | Песчаная дюна', rarity: 'common', price: 10, weight: 70 },
                { name: 'Nova | Орех', rarity: 'common', price: 20, weight: 25 },
                { name: 'AK-47 | Африканская сетка', rarity: 'rare', price: 150, weight: 5 }
            ],
            normal: [
                { name: 'Glock-18 | Литье', rarity: 'common', price: 50, weight: 60 },
                { name: 'M4A4 | Магний', rarity: 'rare', price: 300, weight: 30 },
                { name: 'AWP | Азимов', rarity: 'epic', price: 5000, weight: 10 }
            ]
        };

        // Загрузка данных юзера из LocalStorage
        let balance = parseInt(localStorage.getItem(`balance_${userId}`)) || 5000; // 5000 для теста
        let inventory = JSON.parse(localStorage.getItem(`inventory_${userId}`)) || [];

        function saveUserData() {
            localStorage.setItem(`balance_${userId}`, balance);
            localStorage.setItem(`inventory_${userId}`, JSON.stringify(inventory));
            updateUI();
        }

        function updateUI() {
            document.getElementById('stars').innerText = balance;
            renderInventory();
        }

        // Функция случайного выбора с учетом шансов (весов)
        function getRandomItem(caseType) {
            const caseItems = items[caseType];
            const totalWeight = caseItems.reduce((sum, item) => sum + item.weight, 0);
            let random = Math.random() * totalWeight;
            for (let item of caseItems) {
                if (random < item.weight) return item;
                random -= item.weight;
            }
        }

        let isSpinning = false;

        function startRoulette(caseType, price) {
            if (isSpinning) return;
            if (balance < price) {
                tg.showAlert('❌ Недостаточно звезд!');
                return;
            }

            balance -= price;
            saveUserData();
            isSpinning = true;

            const rouletteArea = document.getElementById('rouletteArea');
            const rouletteLine = document.getElementById('rouletteLine');
            const closeBtn = document.getElementById('closeRouletteBtn');

            rouletteArea.classList.remove('hidden');
            rouletteLine.style.transition = 'none';
            rouletteLine.style.transform = 'translateX(0px)';
            rouletteLine.innerHTML = '';
            closeBtn.disabled = true;

            // Генерируем 50 случайных предметов для линии
            const visualItems = [];
            for (let i = 0; i < 50; i++) {
                visualItems.push(getRandomItem(caseType));
            }

            // Выбираем победителя (он будет 40-м элементом)
            const winningItem = visualItems[40];

            // Рисуем элементы
            visualItems.forEach(item => {
                const div = document.createElement('div');
                div.className = `roulette-item ${item.rarity}`;
                div.innerHTML = `<div>📦</div><div>${item.name}</div>`;
                rouletteLine.appendChild(div);
            });

            // Запускаем анимацию прокрутки
            setTimeout(() => {
                // Ширина одного элемента + маргины примерно 110px. Крутим до 40го элемента
                const itemWidth = 110;
                const offset = (40 * itemWidth) - (window.innerWidth / 2) + 55;

                rouletteLine.style.transition = 'transform 4s cubic-bezier(0.1, 0.8, 0.2, 1)';
                rouletteLine.style.transform = `translateX(-${offset}px)`;
            }, 50);

            // Окончание прокрутки
            setTimeout(() => {
                inventory.push(winningItem);
                saveUserData();
                closeBtn.disabled = false;
                tg.HapticFeedback.notificationOccurred('success');
            }, 4050);
        }

        function closeRoulette() {
            document.getElementById('rouletteArea').classList.add('hidden');
            isSpinning = false;
        }

        function renderInventory() {
            const grid = document.getElementById('invGrid');
            grid.innerHTML = '';
            if (inventory.length === 0) {
                grid.innerHTML = '<p style="grid-column: span 3; color: gray;">Пусто</p>';
                return;
            }
            inventory.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `inv-item ${item.rarity}`;
                div.innerHTML = `<div>📦</div><div>${item.name}</div><div style="color:#fbbf24">★${item.price}</div>`;
                grid.appendChild(div);
            });
        }

        function doUpgrade() {
            if (inventory.length === 0) {
                tg.showAlert('Инвентарь пуст! Сначала открой кейсы.');
                return;
            }
            const resultText = document.getElementById('upgradeResult');
            // Для простоты берем первый предмет
            const itemToUpgrade = inventory[0];

            // Забираем предмет
            inventory.shift();

            // Шанс 30% на успех
            if (Math.random() < 0.3) {
                const prize = { name: '★ Охотничий нож', rarity: 'epic', price: 10000 };
                inventory.push(prize);
                resultText.style.color = '#10b981';
                resultText.innerText = '✅ УСПЕХ! Получен Охотничий нож!';
            } else {
                resultText.style.color = '#ef4444';
                resultText.innerText = `❌ ПРОВАЛ! Скин ${itemToUpgrade.name} сгорел.`;
            }
            saveUserData();
        }

        function showSection(id, btnElement) {
            document.querySelectorAll('.section').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.nav button').forEach(el => el.classList.remove('active'));
            btnElement.classList.add('active');
        }

        updateUI(); // Загрузка при старте
    </script>
</body>

</html>
