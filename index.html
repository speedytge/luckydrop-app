<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuckyDrop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent: #3b82f6;
            --upgrade-yellow: #eab308;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 15px;
            padding-bottom: 80px;
        }

        .hidden {
            display: none !important;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .balance {
            background: var(--card-bg);
            padding: 8px 15px;
            border-radius: 10px;
            font-weight: bold;
            color: var(--upgrade-yellow);
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-top: 5px;
            transition: 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-yellow {
            background: var(--upgrade-yellow);
            color: #000;
        }

        .btn-red {
            background: #ef4444;
            color: white;
        }

        .btn-green {
            background: #10b981;
            color: white;
        }

        /* Сетка */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .card {
            background: var(--card-bg);
            padding: 10px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card img {
            width: 100%;
            height: 80px;
            object-fit: contain;
            margin-bottom: 5px;
        }

        /* Рулетка */
        .roulette-container {
            background: #0b1120;
            border: 2px solid var(--accent);
            border-radius: 10px;
            padding: 20px 0;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
        }

        .roulette-line {
            display: flex;
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        .roulette-item {
            min-width: 100px;
            height: 100px;
            background: var(--card-bg);
            margin: 0 5px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            border-bottom: 4px solid gray;
        }

        .roulette-item img {
            width: 70%;
            height: 50px;
            object-fit: contain;
        }

        .pointer {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 2px;
            height: 100%;
            background: red;
            z-index: 10;
            box-shadow: 0 0 10px red;
        }

        /* Содержимое кейса */
        .case-contents {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
        }

        .content-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid #334155;
            font-size: 12px;
        }

        .content-item img {
            width: 40px;
            height: 30px;
            object-fit: contain;
            margin-right: 10px;
        }

        /* Экран выигрыша */
        .result-screen {
            text-align: center;
            background: radial-gradient(circle, #1e293b 0%, #0f172a 70%);
            padding: 30px 15px;
            border-radius: 15px;
            border: 1px solid var(--accent);
        }

        .result-screen img {
            width: 200px;
            height: 150px;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.5));
            margin: 20px 0;
        }

        /* Апгрейд */
        .upg-arena {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #111;
            padding: 20px 10px;
            border-radius: 10px;
            border: 1px solid #333;
            margin-bottom: 15px;
        }

        .upg-slot {
            width: 30%;
            height: 100px;
            background: #222;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 1px dashed #555;
            text-align: center;
            font-size: 11px;
        }

        .upg-slot img {
            width: 80%;
            height: 50px;
            object-fit: contain;
        }

        /* Круг Апгрейда */
        .upg-center {
            width: 35%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .chance-circle-container {
            position: relative;
            width: 90px;
            height: 90px;
            margin-bottom: 15px;
        }

        .chance-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(var(--upgrade-yellow) 0%, #333 0%);
            position: absolute;
            top: 0;
            left: 0;
            transition: transform 3s cubic-bezier(0.1, 0.8, 0.2, 1);
        }

        .chance-inner {
            width: 70px;
            height: 70px;
            background: #111;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 16px;
            color: var(--upgrade-yellow);
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 5;
        }

        .upg-pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 15px solid white;
            z-index: 10;
        }

        .upg-lists {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .upg-list-box {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 10px;
            height: 250px;
            overflow-y: auto;
        }

        .upg-item {
            background: #2a2a2a;
            padding: 8px;
            border-radius: 5px;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            cursor: pointer;
            border-left: 3px solid gray;
        }

        /* Рамки редкости */
        .common {
            border-color: #b0c3d9 !important;
            color: #b0c3d9;
        }

        .rare {
            border-color: #4b69ff !important;
            color: #4b69ff;
        }

        .epic {
            border-color: #8847ff !important;
            color: #8847ff;
        }

        .legendary {
            border-color: #d32ce6 !important;
            color: #d32ce6;
        }

        .nav {
            display: flex;
            justify-content: space-around;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-dark);
            padding: 15px 0;
            border-top: 1px solid var(--card-bg);
            z-index: 100;
        }

        .nav button {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nav button.active {
            color: var(--accent);
        }
    </style>
</head>

<body>
    <div id="loading"
        style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-dark); z-index:999; display:flex; justify-content:center; align-items:center;">
        <h2>Загрузка данных...</h2>
    </div>

    <div class="header">
        <div style="font-size: 1.2rem; font-weight: bold;">🍀 LuckyDrop</div>
        <div class="balance">★ <span id="stars">0</span></div>
    </div>

    <div id="rouletteArea" class="hidden">
        <div class="roulette-container">
            <div class="pointer"></div>
            <div class="roulette-line" id="rouletteLine"></div>
        </div>
        <div class="case-contents">
            <h4 style="margin: 0 0 10px 0; text-align: center;">Содержимое кейса:</h4>
            <div id="caseItemsList"></div>
        </div>
        <button class="btn" style="margin-top: 15px;"
            onclick="showSection('cases', document.getElementById('navCases'))">Назад</button>
    </div>

    <div id="resultArea" class="hidden result-screen">
        <h3 style="margin:0; color: #fff;">Твой выигрыш:</h3>
        <h2 id="winName" style="margin: 10px 0;">Item Name</h2>
        <img id="winImg" src="" alt="Скин">
        <p style="color: var(--upgrade-yellow); font-weight: bold; font-size: 18px;">Цена: ★ <span
                id="winPrice">0</span></p>
        <button class="btn" id="reopenBtn" onclick="reopenCurrentCase()">Открыть еще раз</button>
        <button class="btn" style="background: transparent; border: 1px solid #475569;"
            onclick="showSection('cases', document.getElementById('navCases'))">В меню</button>
    </div>

    <div id="cases" class="section">
        <div class="grid">
            <div class="card">
                <img
                    src="https://steamcommunity-a.akamaihd.net/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgoWeabqOANf-r-fFAzE2ci0mVW0m_7zO6_cmnhD-Ml0juz--YXygED6rUo4ZWvydoXAdFQ3aF7X-QC7krjug8PpuM-bmiNluCEr4SuMzBywiAYMMLK8kEtnwQ">
                <h4 style="margin: 5px 0;">Кейс Эко</h4>
                <p style="color: var(--upgrade-yellow); margin: 5px 0; font-weight:bold;">★ 500</p>
                <button class="btn" onclick="openRouletteScreen('eco', 500)">Открыть</button>
            </div>
            <div class="card">
                <img
                    src="https://steamcommunity-a.akamaihd.net/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgoWeabqOANf-r-fFAzE2ci0m1-Gnvn8Oq_UmnhD-Ml0juz--YXygED6-UY6ZGv0cYOQd1M4NVnV_Va4xe25hp-0u53LnSdh7D5iuyisxxw-LgA1">
                <h4 style="margin: 5px 0;">Обычный</h4>
                <p style="color: var(--upgrade-yellow); margin: 5px 0; font-weight:bold;">★ 1500</p>
                <button class="btn" onclick="openRouletteScreen('normal', 1500)">Открыть</button>
            </div>
        </div>
    </div>

    <div id="inventory" class="section hidden">
        <h3 style="text-align: center;">Твои скины</h3>
        <div class="grid" id="invGrid"></div>
    </div>

    <div id="upgrades" class="section hidden">
        <div class="upg-arena">
            <div class="upg-slot" id="slotLeft" onclick="clearUpgradeSlot('left')">
                <span style="color:gray;">Твой предмет</span>
            </div>
            <div class="upg-center">
                <div class="chance-circle-container">
                    <div class="upg-pointer"></div>
                    <div class="chance-circle" id="chanceCircle"></div>
                    <div class="chance-inner" id="chanceText">0%</div>
                </div>
                <button class="btn btn-yellow" style="padding: 8px; font-size: 12px; margin-top:0;"
                    onclick="doUpgrade()">АПГРЕЙД</button>
            </div>
            <div class="upg-slot" id="slotRight" onclick="clearUpgradeSlot('right')">
                <span style="color:gray;">Цель</span>
            </div>
        </div>
        <div id="upgradeResult"
            style="text-align: center; font-weight: bold; margin-bottom: 10px; font-size: 18px; text-transform: uppercase;">
        </div>
        <div class="upg-lists">
            <div class="upg-list-box">
                <div style="font-size:12px; color:gray; text-align:center;">Мой инвентарь</div>
                <div id="upgInvList"></div>
            </div>
            <div class="upg-list-box">
                <div style="font-size:12px; color:gray; text-align:center;">Цели</div>
                <div id="upgTargetList"></div>
            </div>
        </div>
    </div>

    <div class="nav">
        <button id="navCases" onclick="showSection('cases', this)" class="active">📦<br>Кейсы</button>
        <button onclick="showSection('inventory', this)">🎒<br>Инвентарь</button>
        <button onclick="showSection('upgrades', this)">⬆️<br>Апгрейд</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Вечные картинки Steam (CDN ссылки)
        const imgURL = "https://steamcommunity-a.akamaihd.net/economy/image/";

        const dbItems = {
            eco: [
                { name: 'P250 | Песчаная дюна', rarity: 'common', price: 10, weight: 40, img: imgURL + '-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpopujwezhhwAMzcTFR09C_k4mClvnmJb_VlT1RsMhwj-zDo9j0hAawq0E9Z2r1JdTGdwU7ZwzRqVC5lrm60JO5vc7Pmns3pGB8stMvYt7U' },
                { name: 'Nova | Орех', rarity: 'common', price: 30, weight: 30, img: imgURL + '-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpou7umeldf0Ob3fDxBvYyJi46Hk_7nI7DflWhR7MZ1iurEpdSn1AbkrRRoY2GldoScd1RraFiE_FLtxO-6jZPq6ZufzSA1s3Qm-z-DyP9rK2A' },
                { name: 'M4A4 | Магний', rarity: 'rare', price: 150, weight: 15, img: imgURL + '-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpou-6kejhjxszfjDFW-M6_hIW0mOX1N-Luhm5V18N0hf-WpInwi0GxqkNqMDivcY6XcAM3M12CqVm-xLjrhJG9ucicyHFkvCMq-z-DyK9O_-kQ' },
                { name: 'AK-47 | Красная линия', rarity: 'epic', price: 600, weight: 10, img: imgURL + '-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot7HxfDhjxszJemkV09-5lpKKqPrxN7LEmyVQ7MEpiLuX8I-k3QXsqRVlZ2GlIYPBdwc4YlvR8gTqxebpg8W_vM-fmHdgvCUn4CndmQv3308mIukPGA' },
                { name: 'Glock-18 | Градиент', rarity: 'legendary', price: 3000, weight: 5, img: imgURL + '-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgposbaqKAxf0v73cCxX7eOwmIWInOT1J-TUhGkH18h0juDU-MKn0QKyqUQ_MD_ydYWVcQE7Z1nZrFe6kObshZPt6smamiNiuSRw-z-DyOaVn2-I' }
            ],
            normal: [
                { name: 'M4A4 | Магний', rarity: 'common', price: 150, weight: 35, img: imgURL + '-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpou-6kejhjxszfjDFW-M6_hIW0mOX1N-Luhm5V18N0hf-WpInwi0GxqkNqMDivcY6XcAM3M12CqVm-xLjrhJG9ucicyHFkvCMq-z-DyK9O_-kQ' },
                { name: 'AK-47 | Красная линия', rarity: 'rare', price: 600, weight: 35, img: imgURL + '-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot7HxfDhjxszJemkV09-5lpKKqPrxN7LEmyVQ7MEpiLuX8I-k3QXsqRVlZ2GlIYPBdwc4YlvR8gTqxebpg8W_vM-fmHdgvCUn4CndmQv3308mIukPGA' },
                { name: 'AWP | Азимов', rarity: 'epic', price: 2500, weight: 20, img: imgURL + '-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot621FAR17PLfYQJD_9W7m5a0mvLwOq7c2D4G65xz0-2ZpNmti1fl_xVva1qwclc8cApvMInmDQa2yO_m0ZTtutjMmHVg7HYr-z-DyI4jCxsS' },
                { name: 'M4A4 | Вой', rarity: 'legendary', price: 12000, weight: 7, img: imgURL + '-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpou-6kejhz2v_Nfz5H_uO1gb-Gw_alIITfn2xZ_MhwmjzF-pj8jEWx80c_YWH1cI_BJw8_YgqEqAK_yOjrgpfpuMzPnHNksnEl4Svemgv3308xNf-lCw' },
                { name: 'AWP | Гунгнир', rarity: 'legendary', price: 50000, weight: 3, img: imgURL + '-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot621FBRw7P7NYjV9-N24q42Ok_7hPvXQhW4A7cQh2e3Do9qmiQWyqBdpYmnxctDDIVA3aVnTrFLskrvu0ZLuupzP1zI97dM8t00' }
            ],
            upgradeTargets: [
                { name: 'Керамбит | Волны', rarity: 'legendary', price: 35000, img: imgURL + '-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpovbSsLQJf2OTEcgFO_c-1mY-DkvbiM7_Sl29U18l4jeHVu43zjAex_UQ9az_xd4SVI1c3aFrQrFS8le2-gMK97c_InHpqsykgtH6OlhC-1B0eb7NshqWACQLJDgY1U1w' }
            ]
        };

        let balance = 5000;
        let inventory = [];
        let currentCase = '';
        let currentPrice = 0;
        let isSpinning = false;

        // --- СИСТЕМА СОХРАНЕНИЙ CLOUD STORAGE (Не сбрасывается!) ---
        function initData() {
            if (tg.CloudStorage) {
                tg.CloudStorage.getKeys((err, keys) => {
                    if (!err && keys.includes('user_balance')) {
                        tg.CloudStorage.getItem('user_balance', (err, val) => { if (val) balance = parseInt(val); });
                        tg.CloudStorage.getItem('user_inventory', (err, val) => {
                            if (val) inventory = JSON.parse(val);
                            finishLoading();
                        });
                    } else {
                        saveUserData(); finishLoading();
                    }
                });
            } else {
                // Фоллбэк на LocalStorage, если Cloud не работает
                balance = parseInt(localStorage.getItem('balance')) || 5000;
                inventory = JSON.parse(localStorage.getItem('inventory')) || [];
                finishLoading();
            }
        }

        function finishLoading() {
            document.getElementById('loading').style.display = 'none';
            updateUI();
        }

        function saveUserData() {
            if (tg.CloudStorage) {
                tg.CloudStorage.setItem('user_balance', balance.toString());
                tg.CloudStorage.setItem('user_inventory', JSON.stringify(inventory));
            } else {
                localStorage.setItem('balance', balance);
                localStorage.setItem('inventory', JSON.stringify(inventory));
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('stars').innerText = balance;
            renderInventory();
            renderUpgradeLists();
        }

        // --- ЛОГИКА РУЛЕТКИ И КЕЙСОВ ---
        function getRandomItem(caseType) {
            const caseItems = dbItems[caseType];
            const totalWeight = caseItems.reduce((sum, item) => sum + item.weight, 0);
            let random = Math.random() * totalWeight;
            for (let item of caseItems) {
                if (random < item.weight) return item;
                random -= item.weight;
            }
        }

        function renderCaseContents(caseType) {
            const list = document.getElementById('caseItemsList');
            list.innerHTML = '';
            const caseItems = dbItems[caseType];
            const totalWeight = caseItems.reduce((sum, item) => sum + item.weight, 0);

            caseItems.sort((a, b) => b.weight - a.weight).forEach(item => {
                const chance = ((item.weight / totalWeight) * 100).toFixed(1);
                const div = document.createElement('div');
                div.className = `content-item ${item.rarity}`;
                div.innerHTML = `
                    <div style="display:flex; align-items:center;">
                        <img src="${item.img}">
                        <span>${item.name} <br> <span style="color:var(--upgrade-yellow)">★${item.price}</span></span>
                    </div>
                    <div style="font-weight:bold;">${chance}%</div>
                `;
                list.appendChild(div);
            });
        }

        function openRouletteScreen(caseType, price) {
            currentCase = caseType;
            currentPrice = price;
            document.querySelectorAll('.section').forEach(el => el.classList.add('hidden'));
            document.getElementById('rouletteArea').classList.remove('hidden');
            document.getElementById('rouletteLine').innerHTML = ''; // Очистка
            renderCaseContents(caseType);
            startRoulette();
        }

        function startRoulette() {
            if (isSpinning) return;
            if (balance < currentPrice) { tg.showAlert('❌ Недостаточно звезд!'); return; }

            balance -= currentPrice;
            saveUserData();
            isSpinning = true;

            const rouletteLine = document.getElementById('rouletteLine');
            rouletteLine.style.transition = 'none';
            rouletteLine.style.transform = 'translateX(0px)';
            rouletteLine.innerHTML = '';

            const visualItems = [];
            for (let i = 0; i < 50; i++) visualItems.push(getRandomItem(currentCase));
            const winningItem = visualItems[40];

            visualItems.forEach(item => {
                const div = document.createElement('div');
                div.className = `roulette-item ${item.rarity}`;
                div.innerHTML = `<img src="${item.img}"><div style="font-size:10px;text-align:center;">${item.name.split('|')[0]}</div>`;
                rouletteLine.appendChild(div);
            });

            setTimeout(() => {
                const offset = (40 * 110) - (window.innerWidth / 2) + 55;
                rouletteLine.style.transition = 'transform 4s cubic-bezier(0.1, 0.8, 0.2, 1)';
                rouletteLine.style.transform = `translateX(-${offset}px)`;
            }, 50);

            setTimeout(() => {
                inventory.push(winningItem);
                saveUserData();
                tg.HapticFeedback.notificationOccurred('success');
                showCaseResult(winningItem);
            }, 4050);
        }

        function showCaseResult(item) {
            document.getElementById('rouletteArea').classList.add('hidden');
            const resArea = document.getElementById('resultArea');
            resArea.classList.remove('hidden');

            document.getElementById('winName').innerText = item.name;
            document.getElementById('winName').className = item.rarity;
            document.getElementById('winImg').src = item.img;
            document.getElementById('winPrice').innerText = item.price;

            isSpinning = false;
        }

        function reopenCurrentCase() {
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('rouletteArea').classList.remove('hidden');
            startRoulette();
        }

        // --- ИНВЕНТАРЬ (ПРОДАЖА И ВЫВОД) ---
        function renderInventory() {
            const grid = document.getElementById('invGrid');
            grid.innerHTML = '';
            if (inventory.length === 0) {
                grid.innerHTML = '<p style="grid-column: span 2; color: gray; text-align:center;">Пусто</p>';
                return;
            }
            inventory.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `card ${item.rarity}`;
                div.innerHTML = `
                    <div>
                        <img src="${item.img}">
                        <div style="font-size:12px; margin-bottom:5px; height: 30px;">${item.name}</div>
                        <div style="color:var(--upgrade-yellow); font-weight:bold; margin-bottom: 5px;">★${item.price}</div>
                    </div>
                    <div style="display:flex; gap:5px;">
                        <button class="btn btn-green" style="font-size:10px; padding:8px;" onclick="sellItem(${index})">Продать</button>
                        <button class="btn" style="font-size:10px; padding:8px;" onclick="withdrawItem()">Вывести</button>
                    </div>`;
                grid.appendChild(div);
            });
        }

        function sellItem(index) {
            const item = inventory[index];
            balance += item.price;
            inventory.splice(index, 1);
            saveUserData();
            tg.HapticFeedback.notificationOccurred('success');
            tg.showAlert(`✅ Успешно продано за ★${item.price}`);
        }

        function withdrawItem() {
            tg.showAlert('⏳ Трейд подготавливается ботом. Пожалуйста, убедитесь, что Trade URL указан в профиле.');
        }

        // --- АПГРЕЙД (КРУТЯЩЕЕСЯ КОЛЕСО) ---
        let upgInputItem = null, upgInputIndex = -1, upgTargetItem = null;
        let upgradeChance = 0;

        function selectForUpgrade(type, item, index) {
            document.getElementById('upgradeResult').innerText = ''; // Очистка прошлого реза
            if (type === 'input') {
                upgInputItem = item; upgInputIndex = index;
                document.getElementById('slotLeft').innerHTML = `<img src="${item.img}"><div>${item.name.split('|')[0]}</div>`;
                document.getElementById('slotLeft').className = `upg-slot ${item.rarity}`;
            } else {
                upgTargetItem = item;
                document.getElementById('slotRight').innerHTML = `<img src="${item.img}"><div>${item.name.split('|')[0]}</div>`;
                document.getElementById('slotRight').className = `upg-slot ${item.rarity}`;
            }
            calculateChance();
        }

        function clearUpgradeSlot(side) {
            if (side === 'left') {
                upgInputItem = null; upgInputIndex = -1;
                document.getElementById('slotLeft').innerHTML = '<span style="color:gray;">Твой предмет</span>';
                document.getElementById('slotLeft').className = 'upg-slot';
            } else {
                upgTargetItem = null;
                document.getElementById('slotRight').innerHTML = '<span style="color:gray;">Цель</span>';
                document.getElementById('slotRight').className = 'upg-slot';
            }
            calculateChance();
        }

        function calculateChance() {
            const chanceText = document.getElementById('chanceText');
            const circle = document.getElementById('chanceCircle');

            // Сброс колеса в нулевую позицию
            circle.style.transition = 'none';
            circle.style.transform = 'rotate(0deg)';

            if (!upgInputItem || !upgTargetItem) {
                upgradeChance = 0;
                chanceText.innerText = '0%';
                circle.style.background = 'conic-gradient(var(--upgrade-yellow) 0%, #333 0%)';
                return;
            }

            upgradeChance = (upgInputItem.price / upgTargetItem.price) * 100;
            if (upgradeChance > 100) upgradeChance = 100;

            chanceText.innerText = `${upgradeChance.toFixed(1)}%`;
            circle.style.background = `conic-gradient(var(--upgrade-yellow) ${upgradeChance.toFixed(1)}%, #333 0%)`;
        }

        let isUpgrading = false;

        function doUpgrade() {
            if (isUpgrading) return;
            if (!upgInputItem || !upgTargetItem) {
                tg.showAlert('Выбери оба предмета!');
                return;
            }

            isUpgrading = true;
            const resText = document.getElementById('upgradeResult');
            resText.innerText = 'Крутим...';
            resText.style.color = 'white';

            inventory.splice(upgInputIndex, 1); // Списываем предмет сразу
            saveUserData();

            const circle = document.getElementById('chanceCircle');
            const roll = Math.random() * 100;
            const isWin = roll <= upgradeChance;

            // Расчет градуса остановки
            // Выигрыш: от 0 до (шанс * 3.6) градусов
            // Проигрыш: от (шанс * 3.6) до 360 градусов
            const chanceDeg = upgradeChance * 3.6;
            let targetDeg = 0;

            if (isWin) {
                // Целимся в желтую зону (чуть-чуть отступаем от краев)
                targetDeg = Math.random() * (chanceDeg - 5) + 2.5;
            } else {
                // Целимся в серую зону
                targetDeg = chanceDeg + Math.random() * (360 - chanceDeg - 5) + 2.5;
            }

            // Крутим колесо на 5 полных оборотов назад + нужный градус (чтобы указатель попал на зону)
            const finalRotation = -(360 * 5 + targetDeg);
            circle.style.transition = 'transform 3s cubic-bezier(0.1, 0.8, 0.2, 1)';
            circle.style.transform = `rotate(${finalRotation}deg)`;

            setTimeout(() => {
                if (isWin) {
                    inventory.push(upgTargetItem);
                    resText.style.color = '#10b981';
                    resText.innerText = `ПОЗДРАВЛЯЕМ! 🎉`;
                    tg.HapticFeedback.notificationOccurred('success');
                } else {
                    resText.style.color = '#ef4444';
                    resText.innerText = `Сгорел... 😢`;
                    tg.HapticFeedback.notificationOccurred('error');
                }
                saveUserData();
                clearUpgradeSlot('left');
                isUpgrading = false;
            }, 3050);
        }

        function renderUpgradeLists() {
            const invList = document.getElementById('upgInvList');
            invList.innerHTML = '';
            inventory.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `upg-item ${item.rarity}`;
                div.innerHTML = `<img src="${item.img}" style="width:30px;height:20px;object-fit:contain;"> 
                                 <span style="flex-grow:1; margin-left:5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${item.name.split('|')[0]}</span>`;
                div.onclick = () => { if (!isUpgrading) selectForUpgrade('input', item, index); };
                invList.appendChild(div);
            });

            const targetList = document.getElementById('upgTargetList');
            targetList.innerHTML = '';
            const allTargets = [...dbItems.normal, ...dbItems.upgradeTargets].sort((a, b) => a.price - b.price);
            allTargets.forEach(item => {
                const div = document.createElement('div');
                div.className = `upg-item ${item.rarity}`;
                div.innerHTML = `<img src="${item.img}" style="width:30px;height:20px;object-fit:contain;"> 
                                 <span style="flex-grow:1; margin-left:5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${item.name.split('|')[0]}</span>`;
                div.onclick = () => { if (!isUpgrading) selectForUpgrade('target', item, 0); };
                targetList.appendChild(div);
            });
        }

        function showSection(id, btnElement) {
            document.querySelectorAll('.section').forEach(el => el.classList.add('hidden'));
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('rouletteArea').classList.add('hidden');
            document.getElementById(id).classList.remove('hidden');
            document.querySelectorAll('.nav button').forEach(el => el.classList.remove('active'));
            if (btnElement) btnElement.classList.add('active');
        }

        // Запуск инициализации при загрузке
        initData();
    </script>
</body>

</html>
